ai_usage_summary: |
  Used Claude for architecture planning, algorithm design discussion, and code review.
  Used GitHub Copilot for autocomplete. All candidate data was processed locally —
  no candidate records were sent to any external AI service. All engineering decisions,
  scoring weights, and design choices are my own.

methodology_summary: |
  Hybrid ranking system with five structured scoring components and a multiplicative
  behavioral signal modifier. Honeypot pre-filter removes impossible timelines,
  extreme keyword stuffers, and the JD's explicit trap (non-technical titles with
  AI keywords stuffed into skills but no matching career history). Semantic fit (28%)
  uses TF-IDF cosine similarity. Skills fit (27%) weights endorsed, duration-verified
  skills higher than unverified ones. Career fit (25%) penalizes pure-consulting
  careers and rewards production ML evidence in career descriptions. Experience (12%)
  peaks at 6-8 years per the JD's stated ideal range. Education (8%) uses the
  dataset's tier field. Behavioral modifier (multiplicative, 0.5x-1.25x) down-weights
  candidates inactive 6+ months or with low recruiter response rates, per the JD's
  explicit guidance that "perfect-on-paper but unreachable" candidates aren't
  actually hireable. Runtime ~100s for 100K candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true